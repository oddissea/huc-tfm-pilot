<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oddissea</title>
  <link rel="icon" href="/oddissea.png" type="image/png">
  <meta name="description" content="Mejora de la detección del cáncer colorrectal con aprendizaje contrastivo e imágenes histológicas escasamente anotadas.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background-color: #261B17;
      color: #E5D6BE;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem 1.5rem 5rem;
      text-align: center;
    }
    .logo {
      width: clamp(180px, 28vw, 260px);
      height: clamp(180px, 28vw, 260px);
      margin-bottom: 2.5rem;
      user-select: none;
    }
    h1 {
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 1.25rem;
      color: #E5D6BE;
    }
    .subtitle {
      font-size: clamp(0.95rem, 1.6vw, 1.15rem);
      font-style: italic;
      font-weight: 300;
      color: #C7B89E;
      max-width: 640px;
      line-height: 1.55;
      margin-bottom: 3rem;
      padding: 0 1rem;
    }
    .btn {
      display: inline-block;
      padding: 0.9rem 3.25rem;
      font-size: 1.05rem;
      font-weight: 500;
      color: #E5D6BE;
      background-color: transparent;
      border: 2px solid #E5D6BE;
      border-radius: 999px;
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: background-color 0.25s ease, color 0.25s ease, transform 0.15s ease;
      cursor: pointer;
    }
    .btn:hover, .btn:focus-visible {
      background-color: #E5D6BE;
      color: #261B17;
      transform: translateY(-1px);
      outline: none;
    }
    footer {
      position: fixed;
      bottom: 1rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.78rem;
      color: rgba(229, 214, 190, 0.45);
      letter-spacing: 0.04em;
    }
    @media (max-width: 480px) {
      footer { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <main>
    <img src="/oddissea.png" alt="Oddissea" class="logo">
    <h1>Oddissea</h1>
    <p class="subtitle">
      Mejora de la detección del cáncer colorrectal con aprendizaje
      contrastivo e imágenes histológicas escasamente anotadas
    </p>
    <a href="https://huc-tfm-pilot.oddissea.com/" class="btn">Entrar</a>
  </main>
  <footer>© 2026 Oddissea</footer>
</body>
</html>

# nginx.conf — config ligera para deploy HUC PC (v1.0.3+).
#
# Replica la arquitectura "nginx delante de Streamlit" del deploy cloud
# (pilot/nginx/nginx.conf), pero SIN TLS, SIN certbot y SIN Basic Auth.
# Pensada para uso local en el HUC PC: Eduardo accede a http://localhost
# desde el propio PC, no necesita autenticación ni HTTPS.
#
# Sirve:
#   - / → proxy a Streamlit (127.0.0.1:8501) con WebSocket upgrade
#   - /dzi/ → static directo desde /tmp/queue/ (los slide.dzi y tiles
#     generados por el worker)
#
# Beneficio respecto a v1.0.1/v1.0.2: **mismo origen** para Streamlit y
# DZIs. Cero problemas CORS. El visor OpenSeadragon funciona idéntico
# que en la VM cloud, porque el setup es funcionalmente igual.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Mapear extensión .dzi al MIME type correcto para que el browser
    # la interprete como XML (sin esto serve_dzi mandaba application/
    # octet-stream y Firefox forzaba la descarga del fichero).
    types {
        application/xml dzi;
    }

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 75;
    client_max_body_size 4G;  # ↑ del default 1M para uploads de TIFF grandes

    upstream streamlit {
        server 127.0.0.1:8501;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ───────────────────────────────────────────────────────────
        # DZI tiles servidos directamente como ficheros estáticos.
        # /tmp/queue/<job_id>/slide.dzi + /tmp/queue/<job_id>/slide_files/...
        # Cache agresivo porque los tiles son inmutables por job_id.
        # ───────────────────────────────────────────────────────────
        location /dzi/ {
            alias /tmp/queue/;
            autoindex off;
            add_header Cache-Control "public, max-age=86400, immutable";
            # Allow-Origin no es estrictamente necesario aquí (mismo origen
            # que Streamlit) pero lo mantenemos por si en el futuro algún
            # consumer externo accede al sidecar.
            add_header Access-Control-Allow-Origin "*";
            try_files $uri =404;
        }

        # ───────────────────────────────────────────────────────────
        # Streamlit reverse proxy con WebSocket upgrade.
        # El upgrade es CRÍTICO — Streamlit usa websockets para todo lo
        # interactivo. Sin esos headers, la app cargaría visualmente pero
        # los botones, sliders y reruns no funcionarían.
        # ───────────────────────────────────────────────────────────
        location / {
            proxy_pass http://streamlit;
            proxy_http_version 1.1;

            # Websocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Headers estándar de proxy reverso
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Streamlit hace requests largas (carga modelos, infer.
            # batches grandes). 24h de timeout para evitar 504s.
            proxy_read_timeout 86400;
            proxy_buffering off;
        }
    }
}

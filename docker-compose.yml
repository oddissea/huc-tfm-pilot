services:
  app:
    build: .
    image: huc-pilot:dev
    container_name: huc-pilot-app
    expose:
      - "8501"
    environment:
      # Path de la cola dentro del container — usado por
      # scripts/archive_jobs.py (Hito 0+1) para localizar los job_dirs
      # cuando se invoca vía `docker compose exec app ...`.
      PILOT_QUEUE_DIR: /tmp/queue
      # Path del archive local dentro del container — destino de las
      # correcciones + features que sobreviven al TTL del prune (Hito 1).
      # En el host vive en ./archive/ (bind mount abajo).
      PILOT_ARCHIVE_DIR: /var/archive
      # TTL del prune en horas. Default 24h (uso QA). En HUC puede
      # convenir más generoso (p. ej. 168 = 7 días) ya que el archive
      # preserva correcciones + features pase lo que pase. Para
      # cambiarlo descomentar la línea siguiente:
      #PILOT_TTL_HOURS: "168"
      # URL base del servidor de DZIs. En el despliegue cloud con nginx
      # delante, usamos URL relativa `/dzi` y nginx la sirve via
      # `alias /dzi/ → /var/www/dzi/`. Esto sobreescribe el default
      # `http://localhost:8888` que la imagen pone para el deploy HUC
      # PC sin nginx (sidecar serve_dzi.py).
      DZI_BASE_URL: /dzi
    restart: unless-stopped
    volumes:
      # Cache de pesos del modelo (~151 MB, F4 + 5 AttnMIL). Persistencia
      # entre reinicios del container para no re-descargar cada vez.
      - ./weights:/app/weights
      # Cola de jobs (uploads + resultados). Persistencia entre redeploys
      # para no perder predicciones al actualizar la app. M4.6 añadió
      # cleanup por TTL para cumplir requisitos de privacidad.
      - ./queue:/tmp/queue
      # Archive local de correcciones + features 512-d (Hito 1). Sobrevive
      # al TTL del prune. En HUC esta es la ÚNICA persistencia de datos del
      # patólogo más allá de 24h — desde aquí se recogen para reentrenar.
      # En QA sirve también para validar el pipeline end-to-end sin GCS.
      - ./archive:/var/archive
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  nginx:
    image: nginx:1.27-alpine
    container_name: huc-pilot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # Volumen compartido con el app container: queue/<job_id>/dzi/...
      # contiene los tiles DZI generados por el worker para el visor
      # OpenSeadragon. nginx los sirve como static (location /dzi/).
      - ./queue:/var/www/dzi:ro
      # Landing estático servido en oddissea.com / www.oddissea.com.
      - ./landing:/usr/share/nginx/landing:ro
    depends_on:
      - app
    restart: unless-stopped
    # Reload nginx every 6h to pick up renewed certs from certbot.
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  certbot:
    image: certbot/certbot:latest
    container_name: huc-pilot-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Try to renew certs every 12h. Let's Encrypt issues 90-day certs; this checks well in advance.
    entrypoint: '/bin/sh -c ''trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'''

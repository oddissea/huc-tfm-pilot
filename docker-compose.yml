services:
  app:
    build: .
    image: huc-pilot:dev
    container_name: huc-pilot-app
    expose:
      - "8501"
    restart: unless-stopped
    volumes:
      # Cache de pesos del modelo (~151 MB, F4 + 25 AttnMIL). Persistencia
      # entre reinicios del container para no re-descargar de GCS cada vez.
      - ./weights:/app/weights
      # Cola de jobs (uploads + resultados). Persistencia entre redeploys
      # para no perder predicciones al actualizar la app. M4.6 añadirá
      # cleanup por TTL para cumplir requisitos de privacidad.
      - ./queue:/tmp/queue
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  nginx:
    image: nginx:1.27-alpine
    container_name: huc-pilot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
    # Reload nginx every 6h to pick up renewed certs from certbot.
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  certbot:
    image: certbot/certbot:latest
    container_name: huc-pilot-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Try to renew certs every 12h. Let's Encrypt issues 90-day certs; this checks well in advance.
    entrypoint: '/bin/sh -c ''trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'''

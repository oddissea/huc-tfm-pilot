<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="openseadragon.min.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: transparent; font-family: system-ui, sans-serif; }
    #viewer { width: 100%; background: transparent; border-radius: 6px; }
    .osd-patch {
      box-sizing: border-box;
      pointer-events: auto;
      cursor: pointer;
    }
    .osd-patch svg { display: block; width: 100%; height: 100%; pointer-events: none; }
    .osd-patch.osd-selected svg rect.sel-marker { display: block; }
    .osd-patch:not(.osd-selected) svg rect.sel-marker { display: none; }
  </style>
  <script>
    /**
     * Bridge inicial — se registra ANTES de cargar OpenSeadragon para
     * no perder el primer 'streamlit:render' que pueda llegar mientras
     * OSD aún está descargándose. Los args pendientes se procesan en
     * cuanto OSD esté disponible.
     */
    window.__pendingArgs = null;
    window.__sendStreamlit = function(type, payload) {
      const msg = Object.assign({
        isStreamlitMessage: true, type: type,
      }, payload || {});
      console.log("[osd_viewer] →", type, msg);
      window.parent.postMessage(msg, "*");
    };
    window.addEventListener("message", function(ev) {
      if (!ev.data || ev.data.type !== "streamlit:render") return;
      console.log("[osd_viewer] ← streamlit:render", ev.data);
      const args = (ev.data.args && ev.data.args.args) || ev.data.args || {};
      window.__pendingArgs = args;
      if (typeof window.__onRender === "function") {
        window.__onRender(args);
      }
      // Si __onRender no está aún listo, los args quedan en
      // __pendingArgs y se procesarán al final del script principal.
    });
  </script>
</head>
<body>
  <div id="viewer"></div>

  <script src="openseadragon.min.js"></script>
  <script>
    /**
     * Lógica del visor. Se ejecuta DESPUÉS de cargar OpenSeadragon.
     * componentReady se envía al final, cuando todo está listo —
     * cualquier render bufferizado en __pendingArgs se procesa antes.
     *
     * Captura de clicks: usamos el evento `canvas-click` del viewer
     * (no listeners DOM ni MouseTracker por overlay). canvas-click
     * SIEMPRE se dispara para clicks sobre el visor, y dentro del
     * handler convertimos las coordenadas del click a coordenadas de
     * imagen para encontrar qué parche contiene esa posición. Es el
     * approach más robusto y no depende de pointer-events del overlay.
     */
    let viewer = null;
    let initialized = false;
    let selectedIdx = null;
    // Fase 0 v4: set de parches seleccionados además del ancla
    // (selectedIdx). Se rellena desde args.selected_idx_set en cada
    // onRender. Todos los miembros del set reciben el highlight
    // amarillo en applyToggles, no solo el ancla.
    let selectedIdxSet = new Set();
    let overlaysData = [];
    let viewCorrected = false;
    const strokeRects = new Map();
    const fillRects = new Map();
    const patchDivs = new Map();
    const SVG_NS = "http://www.w3.org/2000/svg";

    // Paleta unificada con CLASS_COLORS de slide_detail.py (matplotlib).
    // HIP/ART/EXCLUDED usan rojo matplotlib (no gris) — coherencia visual
    // con el disco rojo de GT no-ternario: rojo = "fuera de la tarea
    // ternaria" en cualquier contexto del visor (GT o corrección).
    const OUT_OF_TASK_COLOR = "rgb(214,39,40)";
    const CORR_COLORS = {
      "ADE": "rgb(255,127,14)", "NOR": "rgb(44,160,44)", "CAR": "rgb(31,119,180)",
      "HIP": OUT_OF_TASK_COLOR, "ART": OUT_OF_TASK_COLOR, "EXCLUDED": OUT_OF_TASK_COLOR,
    };
    // Alias retrocompatible (GT no-ternario sigue usando este nombre en el
    // resto del código).
    const X_ERROR_NONTERNARY = OUT_OF_TASK_COLOR;

    const sendStreamlit = window.__sendStreamlit;

    function appendErrorMark(svg, color, kind) {
      // Marca en esquina inferior izquierda. Dos formas según el tipo
      // de error, ambas con class='gt-error' para que applyToggles
      // las localice y actualice (color/forma) entre renders.
      //
      //  - kind === "non_ternary": círculo vacío rojo. Significa
      //    "fuera de la tarea ternaria" (parche HIP o ART, el modelo
      //    no aprendió esa categoría). Visualmente leible como
      //    "no aplica" en lugar de "error".
      //  - kind === "ternary" (default): X. El modelo se equivocó
      //    dentro de la tarea, color = clase real GT.
      if (kind === "non_ternary") {
        // Disco rojo pequeño (relleno) en esquina inferior izquierda.
        // Más pequeño que el ⭕ "corregido" (sup-der, r=0.10) y de color
        // siempre rojo, para que no haya ambigüedad visual entre los dos
        // marcadores circulares del parche.
        const dot = document.createElementNS(SVG_NS, "circle");
        dot.setAttribute("cx", "0.13");
        dot.setAttribute("cy", "0.87");
        dot.setAttribute("r", "0.06");
        dot.setAttribute("fill", color);
        dot.setAttribute("stroke", "#fff");
        dot.setAttribute("stroke-width", "0.015");
        dot.setAttribute("class", "gt-error");
        svg.appendChild(dot);
        return;
      }
      const positions = [
        ["0.05", "0.78", "0.22", "0.95"],   // diagonal ↘
        ["0.05", "0.95", "0.22", "0.78"],   // diagonal ↗
      ];
      for (const [x1, y1, x2, y2] of positions) {
        const ln = document.createElementNS(SVG_NS, "line");
        ln.setAttribute("x1", x1); ln.setAttribute("y1", y1);
        ln.setAttribute("x2", x2); ln.setAttribute("y2", y2);
        ln.setAttribute("stroke", color);
        ln.setAttribute("stroke-width", "0.05");
        ln.setAttribute("stroke-linecap", "round");
        ln.setAttribute("class", "gt-error");
        svg.appendChild(ln);
      }
    }

    function buildOverlayDiv(o) {
      const svg = document.createElementNS(SVG_NS, "svg");
      svg.setAttribute("viewBox", "0 0 1 1");
      svg.setAttribute("preserveAspectRatio", "none");

      const fillRect = document.createElementNS(SVG_NS, "rect");
      fillRect.setAttribute("x", "0");
      fillRect.setAttribute("y", "0");
      fillRect.setAttribute("width", "1");
      fillRect.setAttribute("height", "1");
      fillRect.setAttribute("fill", o.att_fill || "transparent");
      fillRect.setAttribute("stroke", "none");
      fillRect.style.display = "none";
      svg.appendChild(fillRect);
      fillRects.set(o.idx, fillRect);

      // Stroke (predicción): borde del color de la clase predicha del
      // parche. Si el toggle 'ver correcciones aplicadas' está ON y el
      // parche tiene corrección, usamos el color de la corrección.
      let strokeColor = o.color;
      if (viewCorrected && o.corrected && CORR_COLORS[o.corrected]) {
        strokeColor = CORR_COLORS[o.corrected];
      }
      const strokeRect = document.createElementNS(SVG_NS, "rect");
      strokeRect.setAttribute("x", "0.015");
      strokeRect.setAttribute("y", "0.015");
      strokeRect.setAttribute("width", "0.97");
      strokeRect.setAttribute("height", "0.97");
      strokeRect.setAttribute("fill", "none");
      strokeRect.setAttribute("stroke", strokeColor);
      strokeRect.setAttribute("stroke-width", "0.06");
      svg.appendChild(strokeRect);
      strokeRects.set(o.idx, strokeRect);

      // Marcador 'ya corregido': círculo coloreado en la esquina superior
      // derecha. Visible siempre que el parche tenga corrección, sin
      // depender del toggle. La clase 'corr-dot' permite a applyToggles
      // localizarlo y actualizarlo cuando cambia o.corrected (al
      // guardar una corrección nueva).
      if (o.corrected && CORR_COLORS[o.corrected]) {
        const dot = document.createElementNS(SVG_NS, "circle");
        dot.setAttribute("cx", "0.85"); dot.setAttribute("cy", "0.15");
        dot.setAttribute("r", "0.10");
        dot.setAttribute("fill", CORR_COLORS[o.corrected]);
        dot.setAttribute("stroke", "#fff");
        dot.setAttribute("stroke-width", "0.025");
        dot.setAttribute("class", "corr-dot");
        svg.appendChild(dot);
      }

      // Marcador de error: X en la esquina inferior izquierda. Dos casos:
      // - error_kind='ternary': GT real es ADE/NOR/CAR distinta a la
      //   predicción. Color = el de la GT (CORR_COLORS).
      // - error_kind='non_ternary': GT real es HIP o ART (no clasificable
      //   como ternaria). Color = gris. El patólogo ve dónde el modelo
      //   está forzando una predicción ternaria sobre tejido fuera de
      //   tarea.
      if (o.error && o.gt_class) {
        const errColor = (o.error_kind === "non_ternary")
          ? X_ERROR_NONTERNARY
          : (CORR_COLORS[o.gt_class] || X_ERROR_NONTERNARY);
        appendErrorMark(svg, errColor, o.error_kind);
      }

      // Selección amarilla: visible solo cuando idx == selectedIdx.
      const selRect = document.createElementNS(SVG_NS, "rect");
      selRect.setAttribute("x", "0.04");
      selRect.setAttribute("y", "0.04");
      selRect.setAttribute("width", "0.92");
      selRect.setAttribute("height", "0.92");
      selRect.setAttribute("fill", "none");
      selRect.setAttribute("stroke", "#fff200");
      selRect.setAttribute("stroke-width", "0.10");
      selRect.setAttribute("class", "sel-marker");
      selRect.style.display = "none";
      svg.appendChild(selRect);

      const div = document.createElement("div");
      div.className = "osd-patch";
      let tip = `parche #${o.idx}`;
      if (o.cls) tip += `\npredicción F4: ${o.cls}`;
      if (o.probs) tip += `\nprobs F4: ADE=${o.probs[0].toFixed(3)} · NOR=${o.probs[1].toFixed(3)} · CAR=${o.probs[2].toFixed(3)}`;
      if (o.error && o.gt_class) {
        if (o.error_kind === "non_ternary") {
          tip += `\n❌ GT real: ${o.gt_class} (no clasificable como ternario)`;
        } else {
          tip += `\n❌ GT real: ${o.gt_class} (modelo equivocado)`;
        }
      }
      if (o.att !== undefined) {
        const pct = (o.att_rel * 100).toFixed(0);
        tip += `\natención AttnMIL: ${o.att.toFixed(4)} (${pct}% del máximo)`;
      }
      if (o.corrected) tip += `\n✓ corregido como: ${o.corrected}`;
      if (o.pos) tip += `\nposición (y,x): (${o.pos[0]}, ${o.pos[1]})`;
      div.title = tip;
      div.appendChild(svg);
      patchDivs.set(o.idx, div);

      // Click directo en el div: con pointer-events:auto el div recibe
      // los pointer events, así que el canvas-click de OSD ya no se
      // dispara sobre los overlays (solo sobre zonas vacías). Manejamos
      // el click aquí mismo y enviamos el idx a Streamlit.
      // stopPropagation para que OSD no interprete el click como inicio
      // de un drag de pan.
      div.addEventListener("click", function(ev) {
        ev.stopPropagation();
        // Fase 0 v4: Cmd (Mac) / Ctrl (resto) acumula. Click normal
        // sustituye el set por el parche clicado (replace, comportamiento
        // single-patch histórico). Cmd+click sobre un parche ya en el
        // set lo elimina (toggle off); sobre un parche fuera, lo añade.
        const isToggle = ev.metaKey || ev.ctrlKey;
        const action = isToggle ? "toggle" : "replace";
        // Pan/zoom solo en click normal (sin Cmd): el patólogo está
        // construyendo un lote a mano y mover la vista lo descentraría.
        if (!isToggle) {
          // panIfZoomed=false: si el patólogo ya hizo zoom, no movemos
          // (está mirando ahí). Si NO hay zoom, igualmente aplicamos
          // zoom 3x para destacar (lógica unificada en selectPatch).
          selectPatch(o.idx, false);
        }
        console.log("[osd_viewer] div-click", o.idx, "action:", action);
        sendStreamlit("streamlit:setComponentValue", {
          value: { idx: o.idx, ts: Date.now(), action: action },
          dataType: "json",
        });
      });

      return div;
    }

    function findPatchAtImageCoords(x, y) {
      // Busca el primer overlay que contiene la posición (x, y) en
      // coordenadas de imagen del DZI. overlaysData se rellena en
      // setupViewer con los items que llegan de Streamlit.
      for (const o of overlaysData) {
        if (x >= o.x && x <= o.x + o.size && y >= o.y && y <= o.y + o.size) {
          return o.idx;
        }
      }
      return null;
    }

    function setupViewer(args) {
      const { dzi_url, overlays, height } = args;
      overlaysData = overlays || [];
      viewCorrected = args.view_corrected === true;
      document.getElementById("viewer").style.height = `${height}px`;
      sendStreamlit("streamlit:setFrameHeight", { height: height + 10 });

      viewer = OpenSeadragon({
        id: "viewer",
        prefixUrl: "images/",
        tileSources: dzi_url,
        background: "transparent",
        showNavigator: true,
        navigatorPosition: "BOTTOM_RIGHT",
        navigatorHeight: 100,
        navigatorWidth: 130,
        gestureSettingsMouse: { scrollToZoom: true, clickToZoom: false },
        showRotationControl: false,
        animationTime: 0.5,
        immediateRender: true,
        crossOriginPolicy: "Anonymous",
        loadTilesWithAjax: true,
        ajaxWithCredentials: true,
        maxZoomPixelRatio: 5,
      });

      viewer.addHandler("open", function() {
        let selectedOverlay = null;
        for (const o of overlaysData) {
          const div = buildOverlayDiv(o);
          if (window.__pendingSelected != null && o.idx === window.__pendingSelected) {
            selectedOverlay = o;
          }
          viewer.addOverlay({
            element: div,
            location: viewer.viewport.imageToViewportRectangle(o.x, o.y, o.size, o.size),
          });
        }
        applyToggles(window.__lastArgs || {});
        if (window.__pendingSelected != null) updateSelection(window.__pendingSelected);

        // Si hay un parche pre-seleccionado, paneamos+zoomeamos hasta él
        // para que el patólogo lo vea inmediatamente sin tener que buscar.
        if (selectedOverlay) {
          const target = viewer.viewport.imageToViewportCoordinates(
            selectedOverlay.x + selectedOverlay.size / 2,
            selectedOverlay.y + selectedOverlay.size / 2
          );
          viewer.viewport.zoomTo(3.0, target, true);
          viewer.viewport.panTo(target, true);
        }

        // Cuando OSD inicializa, el iframe puede estar todavía ajustándose
        // a su altura final (Streamlit aplica setFrameHeight asíncronamente).
        // OSD ve un contenedor pequeño y no renderiza bien hasta que el
        // user redimensiona la ventana. Forzamos reflow explícito a los
        // 100ms y 500ms para cubrir tanto el caso rápido como el lento.
        const forceReflow = () => {
          if (!viewer || !viewer.world || viewer.world.getItemCount() === 0) return;
          try {
            viewer.viewport.resize();
            viewer.forceRedraw();
          } catch (e) { /* ignore transient errors */ }
        };
        setTimeout(forceReflow, 100);
        setTimeout(forceReflow, 500);
      });

      // ResizeObserver: si el iframe cambia de tamaño en cualquier momento
      // (incluido el ajuste inicial de Streamlit), OSD recalcula viewport
      // y redraw. Esto resuelve el bug 'el visor solo aparece tras
      // redimensionar la ventana' — al ser automático, no hay que esperar
      // a que el user haga el resize manual.
      try {
        const ro = new ResizeObserver(() => {
          // Guard: viewer.viewport.resize() crashea con
          // 'Cannot read properties of undefined (reading 'x')' si
          // se llama antes de que el world tenga items cargados.
          if (viewer && viewer.viewport && viewer.world &&
              viewer.world.getItemCount() > 0) {
            try {
              viewer.viewport.resize();
              viewer.forceRedraw();
            } catch (e) { /* ignore transient resize errors */ }
          }
        });
        ro.observe(document.body);
        ro.observe(document.getElementById("viewer"));
      } catch (e) {
        console.warn("[osd_viewer] ResizeObserver unavailable:", e);
      }

      // canvas-click: ahora redundante porque cada div del overlay tiene
      // su propio click listener (pointer-events:auto). Lo dejamos como
      // fallback por si algún click no llega al div (ej. zoom muy bajo
      // donde los divs son submilimétricos y el cursor cae entre ellos).
      viewer.addHandler("canvas-click", function(event) {
        if (!event.quick) return;
        const viewportPos = viewer.viewport.pointFromPixel(event.position);
        const imgPos = viewer.viewport.viewportToImageCoordinates(viewportPos);
        const idx = findPatchAtImageCoords(imgPos.x, imgPos.y);
        if (idx == null) return;
        // Misma lógica de modificador que el div click handler (v4):
        // Cmd / Ctrl en el evento subyacente → action="toggle". OSD
        // expone event.originalEvent (MouseEvent del browser); de ahí
        // sacamos metaKey/ctrlKey con seguridad.
        const orig = event.originalEvent;
        const isToggle = !!(orig && (orig.metaKey || orig.ctrlKey));
        const action = isToggle ? "toggle" : "replace";
        if (!isToggle) {
          selectPatch(idx, false);
        }
        console.log("[osd_viewer] canvas-click fallback", idx, "action:", action);
        sendStreamlit("streamlit:setComponentValue", {
          value: { idx: idx, ts: Date.now(), action: action },
          dataType: "json",
        });
      });
    }

    function selectPatch(idx, panIfZoomed) {
      // Cambia el highlight amarillo (siempre) + lógica condicional
      // de pan/zoom según el zoom actual y si el caller quiere panear
      // cuando ya hay zoom.
      //
      // Casos:
      // - Vista panorámica (sin zoom previo): SIEMPRE aplicamos zoom 3x
      //   + pan. Tanto click como botón quieren destacar el parche.
      // - Con zoom previo:
      //   * Click directo (panIfZoomed=false): nada — el patólogo ya
      //     está mirando ese sitio, mover despista.
      //   * Botón siguiente (panIfZoomed=true): pan al parche manteniendo
      //     el zoom — está navegando.

      // Highlight amarillo
      if (selectedIdx != null && patchDivs.has(selectedIdx)) {
        const prev = patchDivs.get(selectedIdx);
        prev.classList.remove("osd-selected");
        const oldSel = prev.querySelector("rect.sel-marker");
        if (oldSel) oldSel.style.display = "none";
      }
      selectedIdx = idx;
      if (idx != null && patchDivs.has(idx)) {
        const cur = patchDivs.get(idx);
        cur.classList.add("osd-selected");
        const newSel = cur.querySelector("rect.sel-marker");
        if (newSel) newSel.style.display = "block";
      }
      applyToggles(window.__lastArgs || {});

      // Pan/zoom condicional
      if (viewer && viewer.world && viewer.world.getItemCount() > 0 && idx != null) {
        const o = overlaysData.find(x => x.idx === idx);
        if (o) {
          try {
            const target = viewer.viewport.imageToViewportCoordinates(
              o.x + o.size / 2, o.y + o.size / 2
            );
            const homeZoom = viewer.viewport.getHomeZoom();
            const currentZoom = viewer.viewport.getZoom();
            const isPanoramic = currentZoom < homeZoom * 1.5;
            if (isPanoramic) {
              viewer.viewport.zoomTo(homeZoom * 3.0, target, true);
              viewer.viewport.panTo(target, true);
            } else if (panIfZoomed) {
              viewer.viewport.panTo(target, true);
            }
          } catch (e) {
            console.warn("[osd_viewer] selectPatch failed:", e);
          }
        }
      }
    }

    function applyToggles(args) {
      const showPred = args.show_predictions !== false;
      const showAtt = args.show_attention === true;
      const showSelBorders = args.show_selected_borders !== false;  // default true
      const showOutOfTask = args.show_out_of_task !== false;       // default true
      viewCorrected = args.view_corrected === true;
      const NONTERNARY_LABELS = new Set(["HIP", "ART", "EXCLUDED"]);

      // Sync del set canónico de selección desde Python. Aceptamos array
      // (caso normal), null/undefined (sin set, solo ancla single) o
      // un array vacío. Rehacemos el Set en cada render para reflejar
      // el estado actual sin mezclar con renders anteriores.
      if (Array.isArray(args.selected_idx_set)) {
        selectedIdxSet = new Set(args.selected_idx_set);
      } else if (args.selected_idx_set === null || args.selected_idx_set === undefined) {
        selectedIdxSet = new Set();
      }

      for (const o of overlaysData) {
        // Fase 0 v4: el highlight amarillo se basa ÚNICAMENTE en
        // pertenencia al set (selectedIdxSet). El ancla (selectedIdx)
        // queda como concepto interno para pan/zoom, sin valor visual:
        // si el patólogo hace Cmd+click toggle-off, el patch sale del
        // set y debe perder el amarillo aunque temporalmente sea el
        // ancla del próximo click. Sin esto, un OR ancla∨set causaría
        // que el toggle-off no parezca quitar el highlight.
        const isSelected = selectedIdxSet.has(o.idx);
        // Para el parche seleccionado, ocultar tanto strokeRect (borde
        // de etiqueta) como selRect (borde amarillo) si el patólogo
        // pidió 'bordes off' — para examinar el parche limpio.
        const hideForExamen = isSelected && !showSelBorders;
        // Si el parche es "fuera de tarea" (GT HIP/ART o corregido a
        // HIP/ART/EXCLUDED) y el toggle está OFF, ocultamos sus marcas
        // para dejar el visor coherente con el espacio de la tarea
        // ternaria (lo que vio el modelo en train).
        const isOutOfTaskByGt = o.error && o.gt_class && o.error_kind === "non_ternary";
        const isOutOfTaskByCorr = o.corrected && NONTERNARY_LABELS.has(o.corrected);
        const hideOutOfTask = !showOutOfTask && (isOutOfTaskByGt || isOutOfTaskByCorr);

        const sr = strokeRects.get(o.idx);
        if (sr) {
          let strokeColor = o.color;
          if (viewCorrected && o.corrected && CORR_COLORS[o.corrected]) {
            strokeColor = CORR_COLORS[o.corrected];
          }
          sr.setAttribute("stroke", strokeColor);
          // El borde se oculta si:
          // - showPred está OFF
          // - el parche está siendo examinado limpio (bordes off)
          // - es fuera de tarea y el toggle 'out of task' está OFF
          sr.style.display = (showPred && !hideForExamen && !hideOutOfTask) ? "" : "none";
        }
        const fr = fillRects.get(o.idx);
        if (fr) {
          fr.style.display = showAtt ? "" : "none";
        }
        const div = patchDivs.get(o.idx);
        if (div) {
          // selRect amarillo del seleccionado: visible solo si está
          // seleccionado Y bordes ON.
          const sel = div.querySelector("rect.sel-marker");
          if (sel) {
            sel.style.display = (isSelected && showSelBorders) ? "block" : "none";
          }

          // Círculo de 'corregido': sincronizar con o.corrected. Crear
          // si hay corrección nueva, actualizar color si la corrección
          // cambió de etiqueta (ej. ADE→NOR), borrar si se revirtió
          // (caso futuro de delete-correction). Permite que el círculo
          // aparezca sin recargar el iframe al guardar una corrección.
          const svg = div.querySelector("svg");
          let dot = svg ? svg.querySelector("circle.corr-dot") : null;
          // Ocultamos el círculo de corrección si la corrección es a
          // HIP/ART/EXCLUDED y el toggle 'out of task' está OFF.
          const showCorrDot = o.corrected
            && CORR_COLORS[o.corrected]
            && !(isOutOfTaskByCorr && !showOutOfTask);
          if (showCorrDot) {
            if (!dot && svg) {
              dot = document.createElementNS(SVG_NS, "circle");
              dot.setAttribute("cx", "0.85"); dot.setAttribute("cy", "0.15");
              dot.setAttribute("r", "0.10");
              dot.setAttribute("stroke", "#fff");
              dot.setAttribute("stroke-width", "0.025");
              dot.setAttribute("class", "corr-dot");
              svg.appendChild(dot);
            }
            if (dot) dot.setAttribute("fill", CORR_COLORS[o.corrected]);
          } else if (dot) {
            dot.remove();
          }

          // Marca de error: sincronizar con o.error/o.gt_class/o.error_kind.
          // Puede ser <line> (X ternaria, color via stroke) o <circle>
          // (disco rojo HIP/ART, color via fill). Si el tipo cambia
          // entre renders, regeneramos. Si solo cambia el color,
          // actualizamos el atributo correcto según la forma.
          if (svg) {
            const errMarks = svg.querySelectorAll(".gt-error");
            // Si es disco rojo non_ternary y el toggle 'out of task'
            // está OFF, ocultamos el marcador (no se renderiza).
            const showErrMark = o.error && o.gt_class
              && !(isOutOfTaskByGt && !showOutOfTask);
            if (showErrMark) {
              const errColor = (o.error_kind === "non_ternary")
                ? X_ERROR_NONTERNARY
                : (CORR_COLORS[o.gt_class] || X_ERROR_NONTERNARY);
              const wantedTag = (o.error_kind === "non_ternary") ? "circle" : "line";
              const currentTag = errMarks.length > 0 ? errMarks[0].tagName.toLowerCase() : null;
              if (currentTag !== wantedTag) {
                errMarks.forEach(m => m.remove());
                appendErrorMark(svg, errColor, o.error_kind);
              } else if (wantedTag === "line") {
                errMarks.forEach(m => m.setAttribute("stroke", errColor));
              } else {
                errMarks.forEach(m => m.setAttribute("fill", errColor));
              }
            } else if (errMarks.length > 0) {
              errMarks.forEach(m => m.remove());
            }
          }

          // Refrescar el title (hover) sin recargar el iframe.
          let tip = `parche #${o.idx}`;
          if (o.cls) tip += `\npredicción F4: ${o.cls}`;
          if (o.probs) tip += `\nprobs F4: ADE=${o.probs[0].toFixed(3)} · NOR=${o.probs[1].toFixed(3)} · CAR=${o.probs[2].toFixed(3)}`;
          if (o.error && o.gt_class) {
            if (o.error_kind === "non_ternary") {
              tip += `\n❌ GT real: ${o.gt_class} (no clasificable como ternario)`;
            } else {
              tip += `\n❌ GT real: ${o.gt_class} (modelo equivocado)`;
            }
          }
          if (o.att !== undefined) {
            const pct = (o.att_rel * 100).toFixed(0);
            tip += `\natención AttnMIL: ${o.att.toFixed(4)} (${pct}% del máximo)`;
          }
          if (o.corrected) tip += `\n✓ corregido como: ${o.corrected}`;
          if (o.pos) tip += `\nposición (y,x): (${o.pos[0]}, ${o.pos[1]})`;
          div.title = tip;
        }
      }
    }

    function onRender(args) {
      window.__lastArgs = args;
      if (!initialized) {
        setupViewer(args);
        initialized = true;
      } else {
        // CRÍTICO: refrescar overlaysData con los datos más recientes.
        // Si el patólogo guarda una corrección, el rerun envía un
        // overlays con o.corrected actualizado para ese parche; sin
        // este refresh applyToggles seguiría leyendo el array antiguo
        // y el círculo no se materializaría.
        if (args.overlays) overlaysData = args.overlays;
        applyToggles(args);
      }
      // Selección que viene del parent (panel de correcciones): si
      // pan_to_selected=true, navegamos al parche (botón siguiente,
      // number_input). Si false, NO hay que llamar a selectPatch —
      // selectPatch en vista panorámica fuerza un zoom 3x aunque el
      // caller diga panIfZoomed=false (ver función), y eso provocaba
      // que un Cmd+click toggle en panorámica zoomase a pesar de
      // todo. La pertenencia al set canónico la pinta applyToggles
      // de forma independiente, así que evitar selectPatch aquí es
      // correcto: el visor permanece quieto y los amarillos se
      // refrescan vía args.selected_idx_set.
      const externallySelected = args.selected_idx;
      const panToSelected = args.pan_to_selected === true;
      if (externallySelected != null) {
        if (initialized && patchDivs.size > 0) {
          if (panToSelected) {
            // Navegación explícita (botón siguiente o number_input/range
            // typed + Enter, ambos pre-setean pending_pan=True en Python).
            selectPatch(externallySelected, panToSelected);
          } else {
            // Eco de click directo (replace) o de Cmd+click (toggle):
            // sincronizamos el ancla interna sin mover la vista. El
            // highlight visual lo dirige el set canónico vía
            // applyToggles, así que basta con actualizar selectedIdx
            // para que futuras navegaciones partan del idx correcto.
            selectedIdx = externallySelected;
          }
        } else {
          window.__pendingSelected = externallySelected;
        }
      }
      sendStreamlit("streamlit:setFrameHeight", { height: args.height + 10 });
    }
    // Exponemos onRender al global handler del <head>: si llegó un
    // render mientras OSD se cargaba, lo procesamos ahora.
    window.__onRender = onRender;
    if (window.__pendingArgs) {
      onRender(window.__pendingArgs);
      window.__pendingArgs = null;
    }

    sendStreamlit("streamlit:componentReady", { apiVersion: 1 });
  </script>
</body>
</html>

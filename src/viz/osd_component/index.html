<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="openseadragon.min.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: transparent; font-family: system-ui, sans-serif; }
    #viewer { width: 100%; background: transparent; border-radius: 6px; }
    .osd-patch {
      box-sizing: border-box;
      pointer-events: none;
    }
    .osd-patch svg { display: block; width: 100%; height: 100%; pointer-events: none; }
    .osd-patch.osd-selected svg rect.sel-marker { display: block; }
    .osd-patch:not(.osd-selected) svg rect.sel-marker { display: none; }
  </style>
  <script>
    /**
     * Bridge inicial — se registra ANTES de cargar OpenSeadragon para
     * no perder el primer 'streamlit:render' que pueda llegar mientras
     * OSD aún está descargándose. Los args pendientes se procesan en
     * cuanto OSD esté disponible.
     */
    window.__pendingArgs = null;
    window.__sendStreamlit = function(type, payload) {
      const msg = Object.assign({
        isStreamlitMessage: true, type: type,
      }, payload || {});
      console.log("[osd_viewer] →", type, msg);
      window.parent.postMessage(msg, "*");
    };
    window.addEventListener("message", function(ev) {
      if (!ev.data || ev.data.type !== "streamlit:render") return;
      console.log("[osd_viewer] ← streamlit:render", ev.data);
      const args = (ev.data.args && ev.data.args.args) || ev.data.args || {};
      window.__pendingArgs = args;
      if (typeof window.__onRender === "function") {
        window.__onRender(args);
      }
      // Si __onRender no está aún listo, los args quedan en
      // __pendingArgs y se procesarán al final del script principal.
    });
  </script>
</head>
<body>
  <div id="viewer"></div>

  <script src="openseadragon.min.js"></script>
  <script>
    /**
     * Lógica del visor. Se ejecuta DESPUÉS de cargar OpenSeadragon.
     * componentReady se envía al final, cuando todo está listo —
     * cualquier render bufferizado en __pendingArgs se procesa antes.
     *
     * Captura de clicks: usamos el evento `canvas-click` del viewer
     * (no listeners DOM ni MouseTracker por overlay). canvas-click
     * SIEMPRE se dispara para clicks sobre el visor, y dentro del
     * handler convertimos las coordenadas del click a coordenadas de
     * imagen para encontrar qué parche contiene esa posición. Es el
     * approach más robusto y no depende de pointer-events del overlay.
     */
    let viewer = null;
    let initialized = false;
    let selectedIdx = null;
    let overlaysData = [];
    const strokeRects = new Map();
    const fillRects = new Map();
    const patchDivs = new Map();
    const SVG_NS = "http://www.w3.org/2000/svg";

    const sendStreamlit = window.__sendStreamlit;

    function buildOverlayDiv(o) {
      const svg = document.createElementNS(SVG_NS, "svg");
      svg.setAttribute("viewBox", "0 0 1 1");
      svg.setAttribute("preserveAspectRatio", "none");

      const fillRect = document.createElementNS(SVG_NS, "rect");
      fillRect.setAttribute("x", "0");
      fillRect.setAttribute("y", "0");
      fillRect.setAttribute("width", "1");
      fillRect.setAttribute("height", "1");
      fillRect.setAttribute("fill", o.att_fill || "transparent");
      fillRect.setAttribute("stroke", "none");
      fillRect.style.display = "none";
      svg.appendChild(fillRect);
      fillRects.set(o.idx, fillRect);

      const strokeRect = document.createElementNS(SVG_NS, "rect");
      strokeRect.setAttribute("x", "0.015");
      strokeRect.setAttribute("y", "0.015");
      strokeRect.setAttribute("width", "0.97");
      strokeRect.setAttribute("height", "0.97");
      strokeRect.setAttribute("fill", "none");
      strokeRect.setAttribute("stroke", o.color);
      strokeRect.setAttribute("stroke-width", "0.025");
      svg.appendChild(strokeRect);
      strokeRects.set(o.idx, strokeRect);

      const selRect = document.createElementNS(SVG_NS, "rect");
      selRect.setAttribute("x", "0.04");
      selRect.setAttribute("y", "0.04");
      selRect.setAttribute("width", "0.92");
      selRect.setAttribute("height", "0.92");
      selRect.setAttribute("fill", "none");
      selRect.setAttribute("stroke", "#fff200");
      selRect.setAttribute("stroke-width", "0.06");
      selRect.setAttribute("class", "sel-marker");
      selRect.style.display = "none";
      svg.appendChild(selRect);

      const div = document.createElement("div");
      div.className = "osd-patch";
      let tip = `parche #${o.idx}`;
      if (o.cls) tip += `\nclase predicha: ${o.cls}`;
      if (o.probs) tip += `\nprobs F4: ADE=${o.probs[0].toFixed(3)} NOR=${o.probs[1].toFixed(3)} CAR=${o.probs[2].toFixed(3)}`;
      if (o.att !== undefined) {
        const pct = (o.att_rel * 100).toFixed(0);
        tip += `\natención AttnMIL: ${o.att.toFixed(4)} (${pct}% del máximo)`;
      }
      if (o.pos) tip += `\nposición (y,x): (${o.pos[0]}, ${o.pos[1]})`;
      div.title = tip;
      div.appendChild(svg);
      patchDivs.set(o.idx, div);
      return div;
    }

    function findPatchAtImageCoords(x, y) {
      // Busca el primer overlay que contiene la posición (x, y) en
      // coordenadas de imagen del DZI. overlaysData se rellena en
      // setupViewer con los items que llegan de Streamlit.
      for (const o of overlaysData) {
        if (x >= o.x && x <= o.x + o.size && y >= o.y && y <= o.y + o.size) {
          return o.idx;
        }
      }
      return null;
    }

    function setupViewer(args) {
      const { dzi_url, overlays, height } = args;
      overlaysData = overlays || [];
      document.getElementById("viewer").style.height = `${height}px`;
      sendStreamlit("streamlit:setFrameHeight", { height: height + 10 });

      viewer = OpenSeadragon({
        id: "viewer",
        prefixUrl: "images/",
        tileSources: dzi_url,
        background: "transparent",
        showNavigator: true,
        navigatorPosition: "BOTTOM_RIGHT",
        navigatorHeight: 100,
        navigatorWidth: 130,
        gestureSettingsMouse: { scrollToZoom: true, clickToZoom: false },
        showRotationControl: false,
        animationTime: 0.5,
        immediateRender: true,
        crossOriginPolicy: "Anonymous",
        loadTilesWithAjax: true,
        ajaxWithCredentials: true,
        maxZoomPixelRatio: 5,
      });

      viewer.addHandler("open", function() {
        for (const o of overlaysData) {
          const div = buildOverlayDiv(o);
          viewer.addOverlay({
            element: div,
            location: viewer.viewport.imageToViewportRectangle(o.x, o.y, o.size, o.size),
          });
        }
        applyToggles(window.__lastArgs || {});
        if (window.__pendingSelected != null) updateSelection(window.__pendingSelected);

        // Cuando OSD inicializa, el iframe puede estar todavía ajustándose
        // a su altura final (Streamlit aplica setFrameHeight asíncronamente).
        // OSD ve un contenedor pequeño y no renderiza bien hasta que el
        // user redimensiona la ventana. Forzamos reflow explícito a los
        // 100ms y 500ms para cubrir tanto el caso rápido como el lento.
        const forceReflow = () => {
          try {
            viewer.viewport.resize();
            viewer.forceRedraw();
          } catch (e) {
            console.warn("[osd_viewer] forceReflow failed:", e);
          }
        };
        setTimeout(forceReflow, 100);
        setTimeout(forceReflow, 500);
      });

      // ResizeObserver: si el iframe cambia de tamaño en cualquier momento
      // (incluido el ajuste inicial de Streamlit), OSD recalcula viewport
      // y redraw. Esto resuelve el bug 'el visor solo aparece tras
      // redimensionar la ventana' — al ser automático, no hay que esperar
      // a que el user haga el resize manual.
      try {
        const ro = new ResizeObserver(() => {
          if (viewer && viewer.viewport) {
            viewer.viewport.resize();
            viewer.forceRedraw();
          }
        });
        ro.observe(document.body);
        ro.observe(document.getElementById("viewer"));
      } catch (e) {
        console.warn("[osd_viewer] ResizeObserver unavailable:", e);
      }

      // canvas-click: dispara SIEMPRE para clicks limpios sobre el visor,
      // tanto sobre tile como sobre overlay. event.quick=true significa
      // click limpio (no parte de un drag). event.position son píxeles
      // del canvas; convertimos a coords de imagen y buscamos el patch.
      viewer.addHandler("canvas-click", function(event) {
        if (!event.quick) return;
        const viewportPos = viewer.viewport.pointFromPixel(event.position);
        const imgPos = viewer.viewport.viewportToImageCoordinates(viewportPos);
        const idx = findPatchAtImageCoords(imgPos.x, imgPos.y);
        console.log("[osd_viewer] canvas-click", {
          pixel: event.position, image: imgPos, idx: idx,
        });
        if (idx == null) return;
        updateSelection(idx);
        sendStreamlit("streamlit:setComponentValue", {
          value: { idx: idx, ts: Date.now() },
          dataType: "json",
        });
      });
    }

    function updateSelection(idx) {
      if (selectedIdx != null && patchDivs.has(selectedIdx)) {
        patchDivs.get(selectedIdx).classList.remove("osd-selected");
      }
      selectedIdx = idx;
      if (idx != null && patchDivs.has(idx)) {
        patchDivs.get(idx).classList.add("osd-selected");
      }
    }

    function applyToggles(args) {
      const showPred = args.show_predictions !== false;
      const showAtt = args.show_attention === true;
      for (const r of strokeRects.values()) {
        r.style.display = showPred ? "" : "none";
      }
      for (const r of fillRects.values()) {
        r.style.display = showAtt ? "" : "none";
      }
    }

    function onRender(args) {
      window.__lastArgs = args;
      if (!initialized) {
        setupViewer(args);
        initialized = true;
      } else {
        applyToggles(args);
      }
      const externallySelected = args.selected_idx;
      if (externallySelected != null) {
        if (initialized && patchDivs.size > 0) updateSelection(externallySelected);
        else window.__pendingSelected = externallySelected;
      }
      sendStreamlit("streamlit:setFrameHeight", { height: args.height + 10 });
    }
    // Exponemos onRender al global handler del <head>: si llegó un
    // render mientras OSD se cargaba, lo procesamos ahora.
    window.__onRender = onRender;
    if (window.__pendingArgs) {
      onRender(window.__pendingArgs);
      window.__pendingArgs = null;
    }

    sendStreamlit("streamlit:componentReady", { apiVersion: 1 });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/openseadragon.min.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: transparent; }
    #viewer { width: 100%; background: transparent; border-radius: 6px; }
    .osd-patch {
      box-sizing: border-box;
      pointer-events: auto;
      cursor: pointer;
    }
    .osd-patch svg { display: block; width: 100%; height: 100%; pointer-events: none; }
  </style>
</head>
<body>
  <div id="viewer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/openseadragon.min.js"></script>
  <script>
    // Streamlit component bridge.
    let viewer = null;
    let initialized = false;
    // Mapas idx → DOM nodes (rect del borde, rect del fill) para no
    // recrear overlays en cada cambio de toggle.
    const strokeRects = new Map();
    const fillRects = new Map();
    const SVG_NS = "http://www.w3.org/2000/svg";

    function setupViewer(args) {
      const { dzi_url, overlays, height } = args;
      document.getElementById("viewer").style.height = `${height}px`;
      Streamlit.setFrameHeight(height + 10);

      viewer = OpenSeadragon({
        id: "viewer",
        prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.1/images/",
        tileSources: dzi_url,
        background: "transparent",
        showNavigator: true,
        navigatorPosition: "BOTTOM_RIGHT",
        navigatorHeight: 100,
        navigatorWidth: 130,
        gestureSettingsMouse: { scrollToZoom: true, clickToZoom: false },
        showRotationControl: false,
        animationTime: 0.5,
        immediateRender: true,
        crossOriginPolicy: "Anonymous",
        loadTilesWithAjax: true,
        ajaxWithCredentials: true,
      });

      viewer.addHandler("open", function() {
        for (const o of overlays) {
          // SVG con dos rects superpuestos:
          //   - fill rect (color de la clase predicha del slide, alpha=atención)
          //   - stroke rect (borde del color de la clase predicha del PARCHE)
          // Cada uno se enciende/apaga con su toggle.
          const svg = document.createElementNS(SVG_NS, "svg");
          svg.setAttribute("viewBox", "0 0 1 1");
          svg.setAttribute("preserveAspectRatio", "none");

          // Fill (atención)
          const fillRect = document.createElementNS(SVG_NS, "rect");
          fillRect.setAttribute("x", "0");
          fillRect.setAttribute("y", "0");
          fillRect.setAttribute("width", "1");
          fillRect.setAttribute("height", "1");
          fillRect.setAttribute("fill", o.att_fill || "transparent");
          fillRect.setAttribute("stroke", "none");
          fillRect.style.display = "none";
          svg.appendChild(fillRect);
          fillRects.set(o.idx, fillRect);

          // Stroke (predicción)
          const strokeRect = document.createElementNS(SVG_NS, "rect");
          strokeRect.setAttribute("x", "0.015");
          strokeRect.setAttribute("y", "0.015");
          strokeRect.setAttribute("width", "0.97");
          strokeRect.setAttribute("height", "0.97");
          strokeRect.setAttribute("fill", "none");
          strokeRect.setAttribute("stroke", o.color);
          strokeRect.setAttribute("stroke-width", "0.025");
          svg.appendChild(strokeRect);
          strokeRects.set(o.idx, strokeRect);

          const div = document.createElement("div");
          div.className = "osd-patch";
          let tip = `#${o.idx} · ${o.cls}`;
          if (o.att !== undefined) {
            const pct = (o.att_rel * 100).toFixed(0);
            tip += ` · atención ${o.att.toFixed(4)} (${pct}% del máximo)`;
          }
          div.title = tip;
          div.appendChild(svg);

          div.addEventListener("click", function(ev) {
            ev.stopPropagation();
            Streamlit.setComponentValue({ idx: o.idx, ts: Date.now() });
          });

          viewer.addOverlay({
            element: div,
            location: viewer.viewport.imageToViewportRectangle(o.x, o.y, o.size, o.size),
          });
        }
        applyToggles(window.__lastArgs || {});
      });
    }

    function applyToggles(args) {
      const showPred = args.show_predictions !== false;   // default true
      const showAtt = args.show_attention === true;       // default false
      for (const r of strokeRects.values()) {
        r.style.display = showPred ? "" : "none";
      }
      for (const r of fillRects.values()) {
        r.style.display = showAtt ? "" : "none";
      }
    }

    function onRender(event) {
      const args = event.detail.args;
      window.__lastArgs = args;
      if (!initialized) {
        setupViewer(args);
        initialized = true;
      } else {
        // Solo cambian los toggles → no recreamos overlays
        applyToggles(args);
      }
      Streamlit.setFrameHeight(args.height + 10);
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
  </script>
</body>
</html>

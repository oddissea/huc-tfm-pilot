events {
    worker_connections 1024;
}

http {
    upstream streamlit {
        server app:8501;
    }

    # ---------------------------------------------------------------------
    # HTTP server: handles Let's Encrypt ACME challenges and redirects to HTTPS.
    # ---------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name huc-tfm-pilot.oddissea.com;

        # ACME challenge for Certbot (webroot method, used at first issuance and renewals).
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else: permanent redirect to HTTPS.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------
    # HTTPS server: BasicAuth + reverse proxy to the Streamlit container.
    # ---------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name huc-tfm-pilot.oddissea.com;

        # SSL certificates (issued by Certbot).
        ssl_certificate     /etc/letsencrypt/live/huc-tfm-pilot.oddissea.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/huc-tfm-pilot.oddissea.com/privkey.pem;

        # Recommended SSL options provided by Certbot.
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Security headers.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # BasicAuth (htpasswd file mounted from host).
        auth_basic "HUC TFM Pilot — restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Allow large uploads (TIFF files can be several GB).
        client_max_body_size 0;

        # Streamlit reverse proxy.
        location / {
            proxy_pass http://streamlit;
            proxy_http_version 1.1;

            # Required for Streamlit's WebSocket connections.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Standard proxy headers.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering so streaming responses (SSE/WebSocket) flow through.
            proxy_buffering off;

            # Long-lived WebSocket connections (Streamlit keeps them open while the tab is active).
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}
